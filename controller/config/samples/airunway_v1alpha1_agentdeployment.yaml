# Example: bind a Kagent SRE agent to an in-cluster ModelDeployment.
apiVersion: airunway.ai/v1alpha1
kind: AgentDeployment
metadata:
  name: sre-bot
  namespace: agents
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
spec:
  framework:
    name: kagent
  model:
    deploymentRef:
      name: llama-3-8b
      namespace: inference
  config:
    systemPrompt: |
      You are a Kubernetes SRE assistant. Diagnose pod, deployment, and
      networking issues. Prefer minimal-blast-radius actions.
    skills:
      - cluster-diagnose
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  security:
    podSecurityStandard: restricted
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
---
# Example: bind OpenClaw to an external OpenAI-compatible API.
apiVersion: airunway.ai/v1alpha1
kind: AgentDeployment
metadata:
  name: personal-assistant
  namespace: agents
  labels:
    app.kubernetes.io/name: airunway
    app.kubernetes.io/managed-by: kustomize
spec:
  framework:
    name: openclaw
  model:
    externalAPI:
      type: openai
      baseURL: https://api.openai.com/v1
      modelName: gpt-4o-mini
      credentialsRef:
        name: openai-api-key
        key: api-key
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
  # OpenClaw writes to its working directory, so the catalog's
  # recommendedSecurity already sets readOnlyRootFilesystem=false.
  # Override here only when the deployment needs to differ from the recipe.
