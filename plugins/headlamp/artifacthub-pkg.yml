description: |
  AI Runway Headlamp Plugin provides ML model deployment management within the
  Headlamp Kubernetes dashboard. Deploy, monitor, and manage inference workloads
  across multiple providers including KAITO, KubeRay, Dynamo, and llm-d.

  ## Features

  - **Deployment Management**: Create, view, and delete ML model deployments
  - **Model Catalog**: Browse curated models and HuggingFace models
  - **Provider Status**: Monitor KAITO, KubeRay, Dynamo, and llm-d installation status
  - **Gateway Integration**: Gateway API Inference Extension support for traffic routing
  - **Disaggregated Serving**: Configure prefill/decode separation for supported providers
  - **Manifest Preview**: Review generated Kubernetes resources before deploying
  - **Metrics & Logs**: View deployment metrics and pod logs
  - **GPU Dashboard**: Monitor GPU capacity and availability
  - **AI-Powered Configuration**: Get intelligent deployment configuration suggestions

  ## Requirements

  - Headlamp 0.25.0 or later
  - AI Runway backend service running in the cluster
  - At least one supported inference provider (KAITO, KubeRay, Dynamo, or llm-d) installed

